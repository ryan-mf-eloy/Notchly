name: NotchCopilot
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.3
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.9.0
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 1.3.0
  grpc-swift:
    url: https://github.com/grpc/grpc-swift
    exactVersion: 1.25.0
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: 2.65.0
  argmax-oss-swift:
    url: https://github.com/argmaxinc/argmax-oss-swift
    branch: main
targets:
  NotchCopilot:
    type: application
    platform: macOS
    productName: Notchly
    sources:
      - path: NotchCopilot
        excludes:
          - Resources/CopilotIntentPolicy
          - Resources/CopilotSpeechPolicy
      - path: NotchCopilot/Resources/CopilotIntentPolicy
        type: folder
        buildPhase: resources
      - path: NotchCopilot/Resources/CopilotSpeechPolicy
        type: folder
        buildPhase: resources
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: grpc-swift
        product: GRPC
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: argmax-oss-swift
        product: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchcopilot.app
        PRODUCT_NAME: Notchly
        PRODUCT_MODULE_NAME: NotchCopilot
        INFOPLIST_FILE: NotchCopilot/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: NotchCopilot/NotchCopilot.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: Atlas Voice Dev
        ENABLE_DEBUG_DYLIB: NO
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        Debug:
          ENABLE_HARDENED_RUNTIME: NO
  NotchCopilotTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NotchCopilotTests
    dependencies:
      - target: NotchCopilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchcopilot.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Notchly.app/Contents/MacOS/Notchly"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: Atlas Voice Dev
  NotchCopilotUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: NotchCopilotUITests
    dependencies:
      - target: NotchCopilot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notchcopilot.uitests
        TEST_TARGET_NAME: NotchCopilot
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: Atlas Voice Dev
schemes:
  NotchCopilot:
    build:
      targets:
        NotchCopilot: all
        NotchCopilotTests: [test]
        NotchCopilotUITests: [test]
    run:
      disableMainThreadChecker: true
      disableThreadPerformanceChecker: true
    test:
      disableMainThreadChecker: true
      targets:
        - NotchCopilotTests
        - NotchCopilotUITests
